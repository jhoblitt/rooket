name: integration

# End-to-end integration test: the ginkgo suite in test/e2e drives the real
# `rooket up`/`down` on a GitHub-hosted runner, asserting the Rook/Ceph cluster
# provisions one OSD per worker (node-device, loop-free), settles healthy, serves
# I/O, and tears down cleanly.
#
# Uses docker (the runner's preinstalled, rootful engine) via ROOKET_ENGINE, so
# kind nodes get the host block devices and the local registry works without the
# rootful-podman gymnastics a runner otherwise needs. iSCSI target setup still
# needs root, which `rooket block setup` gets via the runner's passwordless sudo.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rook_ref:
        description: "rook git ref to build and deploy in every matrix job (default: each job's own matrix ref)"
        default: ""
      workers:
        description: "kind worker nodes (one OSD each)"
        default: "3"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast signal in parallel with the e2e job: a compile error, vet finding, or
  # unit-test failure reds out in ~1 minute instead of partway into a
  # ~12-minute e2e run.
  unit:
    name: unit tests + vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout rooket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(git ls-files '*.go' | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi

      - name: go vet (including the e2e suite)
        run: |
          go vet ./...
          go vet -tags e2e ./test/e2e/

      - name: Unit tests
        run: go test -race ./...

  # The runner itself has blanket passwordless sudo, so a policy assertion there
  # would pass even with the rule deleted. This job runs in a container where the
  # test user's ONLY grant is rooket's, which is what makes the deny half mean
  # something.
  sudoers-policy:
    name: sudoers policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: fedora:42
    steps:
      - name: Install test dependencies
        run: dnf -y install --setopt=install_weak_deps=False diffutils git sudo targetcli iscsi-initiator-utils systemd

      - name: Checkout rooket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build rooket
        # actions/checkout leaves the workspace owned by the runner's uid while
        # this job's container runs as root, so git rejects the repository as
        # dubiously owned and go build's VCS stamping fails with exit 128.
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          go build -o /usr/local/bin/rooket .

      - name: Install the rule for an otherwise unprivileged user
        run: |
          set -eux
          useradd -m tester
          rooket sudoers install --user tester
          visudo -cf /etc/sudoers.d/rooket
          test "$(stat -c '%a %U:%G' /etc/sudoers.d/rooket)" = "440 root:root"
          diff <(rooket sudoers print --user tester) /etc/sudoers.d/rooket

      - name: Resolve the paths the rule actually grants
        # rooket resolves every command through filepath.EvalSymlinks before
        # writing the rule, so a command a distro installs as a symlink (e.g.
        # Fedora's /usr/sbin/iscsiadm -> ../bin/iscsiadm) lands in the rule
        # under its resolved name, which `command -v` does not necessarily
        # report. Parse the installed rule itself for the paths it grants,
        # rather than assume either form, so the assertions below exercise
        # exactly what sudo will match.
        run: |
          set -eu
          rule="$(cat /etc/sudoers.d/rooket)"
          path_for() {
            printf '%s' "$rule" | grep -v '^#' | tr -d "\\\\" | tr ',' ' ' | tr -s '[:space:]' '\n' | grep -E "/$1\$" | grep -v '^!' | head -n1
          }
          targetcli_bin="$(path_for targetcli)"
          iscsiadm_bin="$(path_for iscsiadm)"
          systemctl_bin="$(path_for systemctl)"
          tee_bin="$(path_for tee)"
          cat_bin="$(path_for cat)"
          test -n "$targetcli_bin" || { echo "could not resolve targetcli's path from the installed rule" >&2; exit 1; }
          test -n "$iscsiadm_bin" || { echo "could not resolve iscsiadm's path from the installed rule" >&2; exit 1; }
          test -n "$systemctl_bin" || { echo "could not resolve systemctl's path from the installed rule" >&2; exit 1; }
          test -n "$tee_bin" || { echo "could not resolve tee's path from the installed rule" >&2; exit 1; }
          test -n "$cat_bin" || { echo "could not resolve cat's path from the installed rule" >&2; exit 1; }
          {
            echo "TARGETCLI_BIN=$targetcli_bin"
            echo "ISCSIADM_BIN=$iscsiadm_bin"
            echo "SYSTEMCTL_BIN=$systemctl_bin"
            echo "TEE_BIN=$tee_bin"
            echo "CAT_BIN=$cat_bin"
          } >>"$GITHUB_ENV"

      - name: Assert the permitted commands
        run: |
          set -eu
          permit() {
            if out="$(sudo -l -U tester "$@" 2>&1)"; then
              return
            fi
            echo "FAIL: should be permitted: $*" >&2
            echo "$out" >&2
            exit 1
          }
          permit "$TARGETCLI_BIN" /iscsi create iqn.2003-01.local.rooket:x
          permit "$ISCSIADM_BIN" -m node --login
          permit "$SYSTEMCTL_BIN" restart iscsid
          permit "$SYSTEMCTL_BIN" start iscsid
          permit "$TEE_BIN" /etc/iscsi/initiatorname.iscsi
          permit "$CAT_BIN" /etc/sudoers.d/rooket

          # rooket itself never invokes the resolved path: its argv is the
          # bare command name (e.g. "iscsiadm"), which sudo resolves through
          # its own secure_path rather than the caller's $PATH. The rule must
          # permit both forms, since sudo matches by resolved device+inode
          # regardless of which spelling named it — the assertions above alone
          # would miss a rule that only happened to match the resolved path.
          permit targetcli /iscsi create iqn.2003-01.local.rooket:x
          permit iscsiadm -m node --login
          permit systemctl restart iscsid
          permit systemctl start iscsid
          permit tee /etc/iscsi/initiatorname.iscsi
          permit cat /etc/sudoers.d/rooket

      - name: Assert the denied commands
        run: |
          set -eu
          deny() {
            if out="$(sudo -l -U tester "$@" 2>&1)"; then
              echo "FAIL: should be denied: $*" >&2
              echo "$out" >&2
              exit 1
            fi
          }
          deny "$(command -v sh)" -c id
          deny "$TARGETCLI_BIN"
          deny "$SYSTEMCTL_BIN" restart sshd
          deny "$SYSTEMCTL_BIN" link /tmp/evil.service
          deny "$TEE_BIN" /etc/passwd
          deny "$CAT_BIN" /etc/shadow
          deny "$CAT_BIN" /etc/sudoers
          # tee is pinned to exact args: one extra flag must still be denied,
          # not just a wholly different path.
          deny "$TEE_BIN" -a /etc/iscsi/initiatorname.iscsi

      - name: Assert status reporting and uninstall
        run: |
          set -eux
          runuser -u tester -- rooket sudoers status --user tester
          rooket sudoers uninstall
          test ! -e /etc/sudoers.d/rooket
          if runuser -u tester -- rooket sudoers status --user tester; then
            echo "FAIL: status reported success after uninstall" >&2
            exit 1
          fi

  e2e:
    name: rooket up/down e2e (docker, ${{ matrix.rook-ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      # Cover both CSI deploy flows rooket must handle: release-1.19, where
      # the rook operator creates the csi.ceph.io Driver CRs itself, and
      # release-1.20/master, where rooket installs the separate
      # ceph-csi-drivers chart.
      fail-fast: false
      matrix:
        rook-ref: [release-1.19, release-1.20, master]
    env:
      ROOK_REF: ${{ github.event.inputs.rook_ref || matrix.rook-ref }}
      WORKERS: ${{ github.event.inputs.workers || '3' }}
      ROOKET_ENGINE: docker
      # Pin the cluster name: without it every rooket invocation derives the
      # name from its cwd, which must then never sit inside the rook checkout.
      ROOKET_NAME: rook
    steps:
      - name: Checkout rooket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/lib/jvm \
            /usr/share/swift /usr/local/share/powershell || true
          df -h /

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install kind, kubectl, helm
        run: |
          set -eux
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          sudo install -m 0755 ./kind /usr/local/bin/kind && rm -f ./kind
          curl -fsSLo ./kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 ./kubectl /usr/local/bin/kubectl && rm -f ./kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kind version && kubectl version --client && helm version && docker version

      - name: Install iSCSI and LVM tooling
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y open-iscsi targetcli-fb lvm2
          sudo modprobe configfs target_core_mod target_core_file iscsi_tcp || true
          sudo systemctl enable --now iscsid

      - name: Checkout rook
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: rook/rook
          ref: ${{ env.ROOK_REF }}
          path: rook
          # full history + tags so rook's `git describe` yields a valid semver
          # chart version (a shallow checkout gives a bare SHA -> helm errors)
          fetch-depth: 0

      - name: Build rooket and the e2e test binary
        run: |
          set -eux
          go build -o rooket .
          go test -c -tags e2e -o e2e.test ./test/e2e/

      - name: Set up iSCSI OSD disks
        run: ./rooket block setup --workers "$WORKERS" --disk-count 1

      - name: Run e2e suite
        run: |
          ROOK_DIR="${{ github.workspace }}/rook" \
          ROOKET_BIN="${{ github.workspace }}/rooket" \
          ROOKET_WORKERS="$WORKERS" \
          ROOKET_SKIP_BLOCK=true \
            ./e2e.test -test.v -test.timeout 100m

      - name: Diagnostics (on failure)
        if: failure()
        run: |
          k() { ./rooket kubectl "$@"; }
          k get nodes -o wide || true
          k -n rook-ceph get pods -o wide || true
          k -n rook-ceph get pvc,sc || true
          k -n rook-ceph logs -l app=rook-ceph-osd-prepare --tail=100 || true
          df -h / || true

      # Also exercises 'down --all': it must enumerate the suite's leftovers
      # (state dir plus targets, or a still-live cluster on failure) and remove
      # them without flags naming the cluster or its disk layout.
      - name: Tear down (always)
        if: always()
        run: |
          [ -x ./rooket ] || { echo "rooket was never built; nothing to tear down"; exit 0; }
          ./rooket down --all --force --delete-disks
