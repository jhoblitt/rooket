name: integration

# Full "up" integration test: build rooket, stand up a kind cluster with Rook
# (block devices, OSDs) via `rooket up`, verify the Ceph cluster is healthy, then
# tear it all down via `rooket down`. Runs the real podman/kind/iSCSI flow on a
# GitHub-hosted runner.
#
# rooket and kind run under sudo (rootful podman): the kubelet maps each local-PV
# block OSD via a loop device, and only rootful privileged kind nodes get the
# host's loop devices (rootless nodes get just /dev/loop0).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rook_ref:
        description: "rook git ref to build and deploy"
        default: "master"
      workers:
        description: "kind worker nodes (one OSD each)"
        default: "3"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  up-down:
    name: rooket up -> verify -> down
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ROOK_REF: ${{ github.event.inputs.rook_ref || 'master' }}
      WORKERS: ${{ github.event.inputs.workers || '3' }}
    steps:
      - name: Checkout rooket
        uses: actions/checkout@v4

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/lib/jvm \
            /usr/share/swift /usr/local/share/powershell || true
          sudo docker system prune -af || true
          df -h /

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install kind, kubectl, helm
        run: |
          set -eux
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          sudo install -m 0755 ./kind /usr/local/bin/kind && rm -f ./kind
          curl -fsSLo ./kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 ./kubectl /usr/local/bin/kubectl && rm -f ./kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kind version && kubectl version --client && helm version

      - name: Install iSCSI and LVM tooling
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y open-iscsi targetcli-fb lvm2
          sudo modprobe configfs target_core_mod target_core_file iscsi_tcp || true
          sudo systemctl enable --now iscsid

      - name: Raise loop-device limit
        run: |
          set -eux
          # The kubelet maps each local-PV block volume (the OSD device set) via a
          # loop device; the runner's loop module defaults to max_loop=8. Reload it
          # with a higher cap (no loops are in use, so removal is safe). Rootful
          # kind nodes inherit the host loop devices.
          cat /sys/module/loop/parameters/max_loop || true
          sudo modprobe -r loop || true
          sudo modprobe loop max_loop=256
          cat /sys/module/loop/parameters/max_loop

      - name: Build rooket
        run: go build -o rooket .

      - name: Checkout rook
        uses: actions/checkout@v4
        with:
          repository: rook/rook
          ref: ${{ env.ROOK_REF }}
          path: rook
          # full history + tags so rook's `git describe` yields a valid semver
          # chart version (a shallow checkout gives a bare SHA -> helm errors)
          fetch-depth: 0

      - name: rooket up (block setup, kind cluster, build, deploy)
        run: |
          # Run as root: rootful podman gives the kind nodes the host's loop
          # devices (needed by the local-PV OSDs). DOCKERCMD=podman makes rook's
          # make build with podman so rooket can tag/push the image. Retry to ride
          # out transient Ceph image-pull flakes; up is re-runnable.
          n=0
          until [ "$n" -ge 3 ]; do
            sudo DOCKERCMD=podman ./rooket up --dir "${{ github.workspace }}/rook" --workers "$WORKERS" && exit 0
            n=$((n + 1))
            echo "::warning::rooket up attempt $n failed (often a transient image pull); retrying"
            sleep 30
          done
          exit 1

      - name: Verify Ceph OSDs are up
        run: |
          set -eux
          ok=0
          for _ in $(seq 1 60); do
            run=$(sudo kubectl --context kind-rook -n rook-ceph get pods --no-headers \
                    -l app=rook-ceph-osd 2>/dev/null | awk '$3=="Running"' | wc -l)
            echo "OSD pods Running: ${run}/${WORKERS}"
            if [ "${run:-0}" -ge "$WORKERS" ]; then ok=1; break; fi
            sleep 15
          done
          sudo kubectl --context kind-rook -n rook-ceph get pods -o wide || true
          sudo kubectl --context kind-rook -n rook-ceph exec deploy/rook-ceph-tools -- ceph -s 2>/dev/null || true
          sudo kubectl --context kind-rook -n rook-ceph exec deploy/rook-ceph-tools -- ceph osd tree 2>/dev/null || true
          [ "$ok" = 1 ]

      - name: Diagnostics (on failure)
        if: failure()
        run: |
          sudo kubectl --context kind-rook get nodes -o wide || true
          sudo kubectl --context kind-rook -n rook-ceph get pods -o wide || true
          sudo kubectl --context kind-rook -n rook-ceph get pvc,pv || true
          sudo kubectl --context kind-rook -n rook-ceph logs -l app=rook-ceph-osd-prepare --tail=100 || true
          sudo kubectl --context kind-rook -n rook-ceph describe pods -l app=rook-ceph-osd-prepare 2>/dev/null \
            | grep -iE 'Init Containers:|State:|Reason:|Events:|Warning|FailedMapVolume|losetup|loop' | tail -50 || true
          sudo losetup -a | wc -l || true
          for n in $(sudo env KIND_EXPERIMENTAL_PROVIDER=podman kind get nodes --name rook 2>/dev/null); do
            echo "loop devices in node $n:"
            sudo podman exec "$n" sh -c 'ls /dev/loop[0-9]* 2>/dev/null | wc -l; losetup -f 2>&1 || true' || true
          done
          df -h / || true

      - name: rooket down (teardown + zap)
        if: always()
        run: sudo ./rooket down --workers "$WORKERS" --delete-disks || true
