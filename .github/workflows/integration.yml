name: integration

# End-to-end integration test: the ginkgo suite in test/e2e drives the real
# `rooket up`/`down` on a GitHub-hosted runner, asserting the Rook/Ceph cluster
# provisions one OSD per worker (node-device, loop-free), settles healthy, serves
# I/O, and tears down cleanly.
#
# Uses docker (the runner's preinstalled, rootful engine) via ROOKET_ENGINE, so
# kind nodes get the host block devices and the local registry works without the
# rootful-podman gymnastics a runner otherwise needs. iSCSI target setup still
# needs root, which `rooket block setup` gets via the runner's passwordless sudo.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rook_ref:
        description: "rook git ref to build and deploy in every matrix job (default: each job's own matrix ref)"
        default: ""
      workers:
        description: "kind worker nodes (one OSD each)"
        default: "3"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast signal in parallel with the e2e job: a compile error, vet finding, or
  # unit-test failure reds out in ~1 minute instead of partway into a
  # ~12-minute e2e run.
  unit:
    name: unit tests + vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout rooket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(git ls-files '*.go' | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" && echo "$unformatted" && exit 1
          fi

      - name: go vet (including the e2e suite)
        run: |
          go vet ./...
          go vet -tags e2e ./test/e2e/

      - name: Unit tests
        run: go test -race ./...

  e2e:
    name: rooket up/down e2e (docker, ${{ matrix.rook-ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      # Cover both CSI deploy flows rooket must handle: release-1.19, where
      # the rook operator creates the csi.ceph.io Driver CRs itself, and
      # release-1.20/master, where rooket installs the separate
      # ceph-csi-drivers chart.
      fail-fast: false
      matrix:
        rook-ref: [release-1.19, release-1.20, master]
    env:
      ROOK_REF: ${{ github.event.inputs.rook_ref || matrix.rook-ref }}
      WORKERS: ${{ github.event.inputs.workers || '3' }}
      ROOKET_ENGINE: docker
      # Pin the cluster name: without it every rooket invocation derives the
      # name from its cwd, which must then never sit inside the rook checkout.
      ROOKET_NAME: rook
    steps:
      - name: Checkout rooket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/lib/jvm \
            /usr/share/swift /usr/local/share/powershell || true
          df -h /

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install kind, kubectl, helm
        run: |
          set -eux
          curl -fsSLo ./kind https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          sudo install -m 0755 ./kind /usr/local/bin/kind && rm -f ./kind
          curl -fsSLo ./kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 ./kubectl /usr/local/bin/kubectl && rm -f ./kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kind version && kubectl version --client && helm version && docker version

      - name: Install iSCSI and LVM tooling
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y open-iscsi targetcli-fb lvm2
          sudo modprobe configfs target_core_mod target_core_file iscsi_tcp || true
          sudo systemctl enable --now iscsid

      - name: Checkout rook
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: rook/rook
          ref: ${{ env.ROOK_REF }}
          path: rook
          # full history + tags so rook's `git describe` yields a valid semver
          # chart version (a shallow checkout gives a bare SHA -> helm errors)
          fetch-depth: 0

      - name: Build rooket and the e2e test binary
        run: |
          set -eux
          go build -o rooket .
          go test -c -tags e2e -o e2e.test ./test/e2e/

      - name: Set up iSCSI OSD disks
        run: ./rooket block setup --workers "$WORKERS" --disk-count 1

      - name: Run e2e suite
        run: |
          ROOK_DIR="${{ github.workspace }}/rook" \
          ROOKET_BIN="${{ github.workspace }}/rooket" \
          ROOKET_WORKERS="$WORKERS" \
          ROOKET_SKIP_BLOCK=true \
            ./e2e.test -test.v -test.timeout 100m

      - name: Diagnostics (on failure)
        if: failure()
        run: |
          k() { ./rooket kubectl "$@"; }
          k get nodes -o wide || true
          k -n rook-ceph get pods -o wide || true
          k -n rook-ceph get pvc,sc || true
          k -n rook-ceph logs -l app=rook-ceph-osd-prepare --tail=100 || true
          df -h / || true

      # Also exercises 'down --all': it must enumerate the suite's leftovers
      # (state dir plus targets, or a still-live cluster on failure) and remove
      # them without flags naming the cluster or its disk layout.
      - name: Tear down (always)
        if: always()
        run: |
          [ -x ./rooket ] || { echo "rooket was never built; nothing to tear down"; exit 0; }
          ./rooket down --all --force --delete-disks
