apiVersion: v1
kind: Pod
metadata:
  name: rooket-nfs-smoke
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["sh", "-c", "echo rooket > /mnt/nfs/hello && sleep infinity"]
      volumeMounts:
        - name: vol
          mountPath: /mnt/nfs
  volumes:
    - name: vol
      persistentVolumeClaim:
        claimName: rooket-nfs-pvc
