apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rooket-nfs
provisioner: rook-ceph.nfs.csi.ceph.com
parameters:
  nfsCluster: rooket-nfs
  server: rook-ceph-nfs-rooket-nfs-a
  clusterID: {{ .Values.rooket.namespace }}
  fsName: ceph-filesystem
  pool: ceph-filesystem-data0
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: {{ .Values.rooket.namespace }}
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: {{ .Values.rooket.namespace }}
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
  csi.storage.k8s.io/node-stage-secret-namespace: {{ .Values.rooket.namespace }}
reclaimPolicy: Delete
# A hard NFS mount (the kernel default) blocks forever once the CephNFS
# server disappears out from under it, which is exactly what happens when
# the prune path (e.g. `rooket deploy --with-only rbd`) deletes the
# rooket-profiles release while a pod still has this export mounted. That
# wedges the node's `docker rm` at teardown and breaks `rooket down`. soft +
# timeo/retrans let the mount fail fast instead of hanging; nofail keeps a
# failed mount from blocking the pod.
mountOptions:
  - soft
  - timeo=30
  - retrans=2
  - nofail
